<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTAT Zirve Sertifika Sistemi</title>
    <link rel="stylesheet" href="style.css">
    <!-- Sadece PDF Üretim Kütüphanesi Yeterli -->
    <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>

    <div class="container">
        <h2>UTAT Zirve Katılım Sertifikası</h2>
        <p>Sertifikanızı indirmek için lütfen adınızı ve soyadınızı yazınız.</p>
        
        <form id="sertifikaFormu">
            <div class="form-group">
                <label for="adSoyad">Ad Soyad (Sertifikada görünecek şekilde):</label>
                <input type="text" id="adSoyad" required placeholder="Örn: Melih Aydoğan">
            </div>
            <button type="submit" id="btnGonder">Sertifikamı İndir</button>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
